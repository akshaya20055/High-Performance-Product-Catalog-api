# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default is %%(rev)s_%%(slug)s
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file as
# well as the filename.
# string value is passed to dateutil.tz.gettz()
# timezone = UTC

# max length of characters to clone to slug.  Defaults to 40.
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate being used or not
# revision_environment = false

# set to 'true' to allow modules to be imported that are not listed in the
# requirements file.
# allow_empty_history = false

# version locations.  specifies where version files are located.
# Defaults to alembic/versions
# version_locations = %(here)s/alembic/versions

# the database URL is loaded dynamically in env.py from the environment variables
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/products_db

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# after generating a new revision file.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
